# UrbanLog (Urban Werkz Delivery) — static site + chatbot proxy + CMS/admin.
# Published only on loopback; the host nginx reverse-proxies each to its path.
# Named distinctly so they never collide with the unrelated `urbanwerkz` app on the same host.
services:
  app:
    build: .
    image: urbanlog-app
    container_name: urbanlog-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:20031:80"

  # Server-side Claude proxy for the chatbot. nginx: urbanfleetsg.com/api/ -> 127.0.0.1:20032.
  # The API key comes from .env (server-managed, git-ignored) — never baked into the image.
  chat:
    build: ./chat
    image: urbanlog-chat
    container_name: urbanlog-chat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Confirmed bookings are forwarded to the CMS so they appear in the CRM.
      - LEAD_URL=http://admin:3000/cms/lead
      # The bot quotes from the CMS-managed rate card.
      - PRICING_URL=http://admin:3000/cms/pricing
    ports:
      - "127.0.0.1:20032:3000"

  # CMS / admin (SEO, content, CRM, logo). nginx: /admin and /cms/ -> 127.0.0.1:20033.
  # Content + leads + uploads persist in the named volume (survives deploys).
  admin:
    build: ./admin
    image: urbanlog-admin
    container_name: urbanlog-admin
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/data
    volumes:
      - urbanlog_cms_data:/data
    ports:
      - "127.0.0.1:20033:3000"

volumes:
  urbanlog_cms_data:
